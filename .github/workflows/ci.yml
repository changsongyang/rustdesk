###########################################################################
# RustDesk 主持续集成工作流
# 
# 功能描述：
#   该工作流负责 RustDesk 项目的持续集成，包括构建验证和测试
#   支持多种目标平台和架构
#
# 触发条件：
#   - workflow_dispatch: 手动触发
#   - pull_request: PR 提交（忽略文档和配置文件变更）
#   - push: 推送到 master 分支（忽略非代码变更）
#
# 合规性说明：
#   - 遵循 GitHub Actions 安全最佳实践
#   - 使用官方认证的 Action 工具
#   - 缓存策略优化构建性能
#   - 敏感信息通过 Secrets 管理
#
# 版本控制：
#   - Rust: 1.95
#   - vcpkg: 120deac3062162151622ca4860575a33844ba10b (2025.08.27)
###########################################################################
name: CI

# 环境变量配置
env:
  ###########################################################################
  # 工具链版本配置
  ###########################################################################
  RUST_VERSION: "1.95"                         # Rust 工具链版本
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"  # vcpkg 版本
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"  # vcpkg 二进制缓存源

  ###########################################################################
  # 网络和稳定性配置
  ###########################################################################
  CARGO_NET_RETRY: "10"                        # Cargo 网络重试次数
  CARGO_HTTP_MULTIPLEXING: "false"             # 禁用 HTTP 多路复用
  CARGO_TERM_COLOR: "always"                   # 始终显示彩色输出
  CARGO_INCREMENTAL: "true"                    # 启用增量编译

# 工作流触发条件
on:
  # 手动触发（用于调试和测试）
  workflow_dispatch:
  
  # PR 触发（忽略文档变更）
  pull_request:
    paths-ignore:
      - "docs/**"                              # 文档目录
      - "README.md"                            # 主说明文档
  
  # 推送触发（仅 master 分支）
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"                           # GitHub 配置目录
      - "docs/**"                              # 文档目录
      - "README.md"                            # 主说明文档
      - "res/**"                               # 资源文件目录
      - "appimage/**"                          # AppImage 打包目录
      - "flatpak/**"                           # Flatpak 打包目录

jobs:
  ###########################################################################
  # 安全审计作业
  # 使用 cargo-deny 检查依赖漏洞和许可证合规性
  ###########################################################################
  security-audit:
    name: Security Audit (cargo-deny)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run cargo-deny (advisories)
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check advisories
          args: --log-level warn

      - name: Run cargo-deny (bans)
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check bans
          args: --log-level warn

  ###########################################################################
  # 质量门禁作业
  # 运行格式化检查和 Linting
  ###########################################################################
  quality-gate:
    name: Quality Gate (fmt + clippy)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Run rustfmt check
        run: cargo fmt --check

      - name: Run clippy check
        run: cargo clippy --all-targets --all-features -- -D warnings

  ###########################################################################
  # 构建作业矩阵
  # 仅在安全审计和质量门禁通过后运行
  ###########################################################################
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    needs: [security-audit, quality-gate]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # - { target: aarch64-unknown-linux-gnu   , os: ubuntu-20.04, use-cross: true }
          # - { target: arm-unknown-linux-gnueabihf , os: ubuntu-20.04, use-cross: true }
          # - { target: arm-unknown-linux-musleabihf, os: ubuntu-20.04, use-cross: true }
          # - { target: i686-pc-windows-msvc        , os: windows-2022                  }
          # - { target: i686-unknown-linux-gnu      , os: ubuntu-20.04, use-cross: true }
          # - { target: i686-unknown-linux-musl     , os: ubuntu-20.04, use-cross: true }
          # - { target: x86_64-apple-darwin         , os: macos-10.15                   }
          # - { target: x86_64-pc-windows-gnu       , os: windows-2022                  }
          # - { target: x86_64-pc-windows-msvc      , os: windows-2022                  }
          - { target: x86_64-unknown-linux-gnu    , os: ubuntu-24.04                  }
          # - { target: x86_64-unknown-linux-musl   , os: ubuntu-20.04, use-cross: true }
    steps:
    - name: Free Disk Space (Ubuntu)
      if: runner.os == 'Linux'
      # jlumbroso/free-disk-space@main is used in .github\workflows\flutter-build.yml
      # But pinning to a specific version to avoid unexpected issues is preferred.
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v6
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install prerequisites
      shell: bash
      run: |
        case ${{ matrix.job.target }} in
          x86_64-unknown-linux-gnu)
            sudo apt-get -y update
            sudo apt-get install -y \
               clang \
               cmake \
               curl \
               gcc \
               git \
               g++ \
               libpam0g-dev \
               libasound2-dev \
               libunwind-dev \
               libgstreamer1.0-dev \
               libgstreamer-plugins-base1.0-dev \
               libgtk-3-dev \
               libpulse-dev \
               libva-dev \
               libvdpau-dev \
               libxcb-randr0-dev \
               libxcb-shape0-dev \
               libxcb-xfixes0-dev \
               libxdo-dev \
               libxfixes-dev \
               nasm \
               wget
            ;;
          # arm-unknown-linux-*) sudo apt-get -y update ; sudo apt-get -y install gcc-arm-linux-gnueabihf ;;
          # aarch64-unknown-linux-gnu) sudo apt-get -y update ; sudo apt-get -y install gcc-aarch64-linux-gnu ;;
        esac

    - name: Setup vcpkg with Github Actions binary cache
      uses: lukka/run-vcpkg@v11
      id: runvcpkg
      with:
        vcpkgDirectory: /opt/artifacts/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Set VCPKG_ROOT environment variable
      shell: bash
      run: |
        echo "VCPKG_ROOT=${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}" >> $GITHUB_ENV
        echo "VCPKG_ROOT=${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}" >> $GITHUB_OUTPUT

    - name: Verify vcpkg setup
      shell: bash
      run: |
        echo "=== 环境验证 ==="
        rustc --version
        cargo --version
        echo "VCPKG_ROOT: $VCPKG_ROOT"
        echo "RUST_VERSION: ${{ env.RUST_VERSION }}"
        ls -la $VCPKG_ROOT || echo "vcpkg directory not found"

    - name: Install vcpkg dependencies
      run: |
        $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
      shell: bash

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: ${{ matrix.job.target }}
        components: ''

    - name: Set Rust environment
      shell: bash
      run: |
        rustup override set ${{ env.RUST_VERSION }}
        rustup target add ${{ matrix.job.target }}

    - name: Show version information (Rust, cargo, GCC)
      shell: bash
      run: |
        gcc --version || true
        rustup -V
        rustup toolchain list
        # 确保使用正确的 Rust 工具链版本（修复 Cargo.lock 版本 4 兼容性问题）
        rustup default ${{ env.RUST_VERSION }}
        cargo -V
        rustc -V
        cargo metadata --format-version=1 | head -5 || true

    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: "rust-cache-v2-${{ env.RUST_VERSION }}"
        workspaces: |
          target/
        save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' }}

    - name: Build with parallel jobs
      run: cargo +${{ env.RUST_VERSION }} build --locked --target=${{ matrix.job.target }} -j $(nproc)
      shell: bash
      env:
        CARGO_INCREMENTAL: "true"
        CARGO_PROFILE_RELEASE_INCREMENTAL: "true"

    - name: clean
      shell: bash
      run: |
        cargo clean

    # - name: Strip debug information from executable
    #   id: strip
    #   shell: bash
    #   run: |
    #     # Figure out suffix of binary
    #     EXE_suffix=""
    #     case ${{ matrix.job.target }} in
    #       *-pc-windows-*) EXE_suffix=".exe" ;;
    #     esac;

    #     # Figure out what strip tool to use if any
    #     STRIP="strip"
    #     case ${{ matrix.job.target }} in
    #       arm-unknown-linux-*) STRIP="arm-linux-gnueabihf-strip" ;;
    #       aarch64-unknown-linux-gnu) STRIP="aarch64-linux-gnu-strip" ;;
    #       *-pc-windows-msvc) STRIP="" ;;
    #     esac;

    #     # Setup paths
    #     BIN_DIR="${{ env.CICD_INTERMEDIATES_DIR }}/stripped-release-bin/"
    #     mkdir -p "${BIN_DIR}"
    #     BIN_NAME="${{ env.PROJECT_NAME }}${EXE_suffix}"
    #     BIN_PATH="${BIN_DIR}/${BIN_NAME}"

    #     # Copy the release build binary to the result location
    #     cp "target/${{ matrix.job.target }}/release/${BIN_NAME}" "${BIN_DIR}"

    #     # Also strip if possible
    #     if [ -n "${STRIP}" ]; then
    #       "${STRIP}" "${BIN_PATH}"
    #     fi

    #     # Let subsequent steps know where to find the (stripped) bin
    #     echo ::set-output name=BIN_PATH::${BIN_PATH}
    #     echo ::set-output name=BIN_NAME::${BIN_NAME}

    - name: Run clippy (x86_64 only)
      if: ${{ matrix.job.target == 'x86_64-pc-windows-msvc' || matrix.job.target == 'x86_64-unknown-linux-gnu' || matrix.job.target == 'x86_64-apple-darwin' }}
      run: cargo +${{ env.RUST_VERSION }} clippy --all-targets -- -D warnings
      shell: bash

    - name: Run rustfmt check (x86_64 only)
      if: ${{ matrix.job.target == 'x86_64-pc-windows-msvc' || matrix.job.target == 'x86_64-unknown-linux-gnu' || matrix.job.target == 'x86_64-apple-darwin' }}
      run: cargo +${{ env.RUST_VERSION }} fmt --check
      shell: bash

    - name: Set testing options
      id: test-options
      shell: bash
      run: |
        # test only library unit tests and binary for arm-type targets
        unset CARGO_TEST_OPTIONS

        case ${{ matrix.job.target }} in
          arm-* | aarch64-*)
            CARGO_TEST_OPTIONS="--lib --bin ${PROJECT_NAME}"
            ;;
          *)
            CARGO_TEST_OPTIONS="--workspace --no-fail-fast -- --skip test_get_cursor_pos --skip test_get_key_state"
            ;;
        esac;

        #deprecated echo ::set-output name=CARGO_TEST_OPTIONS::${CARGO_TEST_OPTIONS}
        echo "CARGO_TEST_OPTIONS=${CARGO_TEST_OPTIONS}" >> $GITHUB_ENV
        echo "CARGO_TEST_OPTIONS=${CARGO_TEST_OPTIONS}" >> $GITHUB_OUTPUT

    - name: Run tests
      run: cargo +${{ env.RUST_VERSION }} test --locked --target=${{ matrix.job.target }} ${{ steps.test-options.outputs.CARGO_TEST_OPTIONS}}
      shell: bash
