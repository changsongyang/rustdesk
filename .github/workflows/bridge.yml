###########################################################################
# Flutter-Rust Bridge 构建工作流
# 
# 功能描述：
#   该工作流负责生成 Flutter 和 Rust 之间的桥接代码
#   通过 flutter_rust_bridge_codegen 工具自动生成绑定代码
#   支持被其他工作流通过 workflow_call 调用
#
# 合规性说明：
#   - 遵循 GitHub Actions 安全最佳实践
#   - 使用官方认证的 Action 工具
#   - 缓存策略优化构建性能
#
# 版本控制：
#   - Rust: 1.95
#   - Flutter: 3.24.5
#   - Flutter-Rust-Bridge: 1.80.1
#   - Cargo Expand: 1.0.95
###########################################################################
name: Build flutter-rust-bridge

# 触发条件：仅通过其他工作流调用
on:
  workflow_call:

# 环境变量配置
env:
  ###########################################################################
  # 工具版本配置
  ###########################################################################
  RUST_VERSION: "1.95"                          # Rust 工具链版本
  FLUTTER_VERSION: "3.24.5"                     # Flutter 版本
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"         # Flutter-Rust 桥接版本
  CARGO_EXPAND_VERSION: "1.0.95"                # Cargo Expand 版本

  ###########################################################################
  # 网络稳定性配置
  ###########################################################################
  # Node.js 配置 - 解决 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

  # Cargo 网络配置 - 提高下载稳定性
  CARGO_NET_RETRY: "10"                         # 网络重试次数
  CARGO_HTTP_MULTIPLEXING: "false"              # 禁用 HTTP 多路复用
  CARGO_TERM_COLOR: "always"                    # 始终显示彩色输出
  CARGO_INCREMENTAL: "true"                     # 启用增量编译

jobs:
  generate_bridge:
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-unknown-linux-gnu,
              os: ubuntu-22.04,
              extra-build-args: "",
            }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get install ca-certificates -y
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libclang-dev \
            libgtk-3-dev \
            llvm-dev \
            nasm \
            ninja-build \
            pkg-config \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-${{ matrix.job.os }}-${{ env.RUST_VERSION }}
          workspaces: |
            target/
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' }}

      - name: Cache Bridge
        id: cache-bridge
        uses: actions/cache@v5
        with:
          path: /tmp/flutter_rust_bridge
          key: bridge-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-${{ env.FLUTTER_VERSION }}
          restore-keys: |
            bridge-${{ env.FLUTTER_RUST_BRIDGE_VERSION }}-
            bridge-

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter && sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml && flutter pub get && popd

      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Upload Artifact
        uses: actions/upload-artifact@master
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h
