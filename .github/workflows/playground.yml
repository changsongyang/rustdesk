###########################################################################
# RustDesk Playground 工作流
# 
# 功能描述：
#   该工作流用于测试不同版本组合的构建兼容性
#   支持多种 Flutter 和 Rust 版本组合测试
#
# 触发条件：
#   - workflow_dispatch: 手动触发
#   - 可配置为定时触发（当前注释掉）
#
# 合规性说明：
#   - 遵循 GitHub Actions 安全最佳实践
#   - 使用官方认证的 Action 工具
#   - 敏感信息通过 Secrets 管理
#   - 网络稳定性配置优化
#
# 版本控制：
#   - Rust: 1.95
#   - Flutter: 3.24.5
#   - vcpkg: 120deac3062162151622ca4860575a33844ba10b (2025.08.27)
###########################################################################
name: playground

# 触发条件
on:
  # 定时触发（当前禁用，可取消注释启用）
  # schedule:
  #   - cron: "0 0 * * *"  # 每天凌晨执行
  
  # 手动触发
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
        description: "是否上传构建产物"

# 环境变量配置
env:
  ###########################################################################
  # 语言运行时版本配置
  ###########################################################################
  RUST_VERSION: "1.95"                          # Rust 工具链版本
  FLUTTER_VERSION: "3.24.5"                     # Flutter 桌面版本
  ANDROID_FLUTTER_VERSION: "3.24.5"             # Flutter Android 版本
  FLUTTER_ELINUX_VERSION: "3.16.9"              # ARM64 Linux 特殊版本
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"         # Flutter-Rust 桥接版本

  ###########################################################################
  # 工具依赖版本配置
  ###########################################################################
  CARGO_NDK_VERSION: "3.1.2"                    # Cargo NDK 插件版本
  CARGO_EXPAND_VERSION: "1.0.95"                # Cargo Expand 版本
  LLVM_VERSION: "15.0.6"                        # LLVM/Clang 版本
  NDK_VERSION: "r28c"                           # Android NDK 版本

  ###########################################################################
  # 网络稳定性配置
  ###########################################################################
  # Node.js 配置
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

  # Cargo 网络配置
  CARGO_NET_RETRY: "10"                         # 网络重试次数
  CARGO_HTTP_MULTIPLEXING: "false"              # 禁用 HTTP 多路复用
  CARGO_TERM_COLOR: "always"                    # 始终显示彩色输出
  CARGO_HTTP_TIMEOUT: "300"                     # HTTP 超时时间（秒）
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"          # 使用 Git CLI 进行 fetch
  CARGO_INCREMENTAL: "true"                     # 启用增量编译

  # vcpkg 网络配置
  VCPKG_MAX_RETRIES: "10"                       # 最大重试次数
  VCPKG_HTTP_TIMEOUT: "300"                     # HTTP 超时时间（秒）
  VCPKG_HTTP_RETRY_DELAY: "5"                   # 重试延迟（秒）
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite" # 二进制缓存源
  VCPKG_DEFAULT_BINARY_CACHE_PATH: ${{ github.workspace }}/vcpkg-cache

  # Git 网络配置
  GIT_CONFIG_HTTP_LOW_SPEED_LIMIT: "1000"       # 低速限制（字节/秒）
  GIT_CONFIG_HTTP_LOW_SPEED_TIME: "60"          # 低速时间阈值（秒）
  GIT_CONFIG_HTTP_FOLLOW_REDIRECTS: "true"      # 跟随重定向
  GIT_CONFIG_HTTP_VERSION: "HTTP/1.1"           # HTTP 版本

  ###########################################################################
  # 构建配置
  ###########################################################################
  VERSION: "2.0.0"                              # 应用版本号
  TAG_NAME: "nightly"                           # 默认标签名称
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"  # vcpkg 版本

  ###########################################################################
  # 敏感信息（通过 Secrets 管理）
  ###########################################################################
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"   # Android 签名密钥
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"         # macOS 签名证书
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"            # 是否上传产物
  
  # 自定义服务器配置
  RS_PUB_KEY: "${{ secrets.RS_PUB_KEY }}"                     # 服务器公钥
  RENDEZVOUS_SERVER: "${{ secrets.RENDEZVOUS_SERVER }}"       # 中继服务器地址
  API_SERVER: "${{ secrets.API_SERVER }}"                     # API 服务器地址
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}"               # 签名服务地址

jobs:
  build-for-macOS:
    name: ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-apple-darwin,
              os: macos-13, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
              extra-build-args: "",
              arch: x86_64,
              flutter: "3.13.9",
              ref: "f6509e3fd6917aa976bad2fc684182601ebf2434",
              bridge: "1.80.1",
              date: "20231219"
            }
          - {
              target: x86_64-apple-darwin,
              os: macos-13, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
              extra-build-args: "",
              arch: x86_64,
              flutter: "3.10.6",
              ref: "f6509e3fd6917aa976bad2fc684182601ebf2434",
              bridge: "1.80.1",
              date: "20231219"
            }
          - {
              target: x86_64-apple-darwin,
              os: macos-13, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
              extra-build-args: "",
              arch: x86_64,
              flutter: "3.10.6",
              ref: "85ddfc0739f052cab0029c46b899b959ee94eeb8",
              bridge: "1.80.1",
              date: "20231119"
            }
          - {
              target: x86_64-apple-darwin,
              os: macos-13, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
              extra-build-args: "",
              arch: x86_64,
              flutter: "3.13.9",
              ref: "85ddfc0739f052cab0029c46b899b959ee94eeb8",
              bridge: "1.80.1",
              date: "20231119"
            }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: ${{ matrix.job.ref }}
          submodules: recursive

      - name: Import the codesign cert
        if: env.MACOS_P12_BASE64 != null
        uses: apple-actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}
          keychain: rustdesk

      - name: Check sign and import sign key
        if: env.MACOS_P12_BASE64 != null
        run: |
          security default-keychain -s rustdesk.keychain
          security find-identity -v

      - name: Import notarize key
        if: env.MACOS_P12_BASE64 != null
        uses: timheuer/base64-to-file@v1.2
        with:
          # https://gregoryszorc.com/docs/apple-codesign/stable/apple_codesign_rcodesign.html#notarizing-and-stapling
          fileName: rustdesk.json
          fileDir: ${{ github.workspace }}
          encodedString: ${{ secrets.MACOS_NOTARIZE_JSON }}

      - name: Install rcodesign tool
        if: env.MACOS_P12_BASE64 != null
        shell: bash
        run: |
          pushd /tmp
          wget https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz
          tar -zxvf apple-codesign-0.22.0-macos-universal.tar.gz
          mv apple-codesign-0.22.0-macos-universal/rcodesign /usr/local/bin
          popd

      - name: Install build runtime
        run: |
          brew install llvm create-dmg nasm pkg-config

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ matrix.job.flutter }}
          cache: true
          cache-dependency-path: flutter/pubspec.lock

      - name: 配置 Flutter pub-cache 缓存
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ matrix.job.flutter }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-${{ matrix.job.flutter }}-
            flutter-pub-${{ runner.os }}-
          save-always: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: "rustfmt"
          default: true

      - name: Verify Rust toolchain installation
        shell: bash
        run: |
          rustup -V
          rustup toolchain list
          # 确保使用正确的 Rust 工具链版本（修复 Cargo.lock 版本 4 兼容性问题）
          rustup default ${{ env.RUST_VERSION }}
          cargo -V
          rustc -V
          echo "Using Rust toolchain: $(rustup show active-toolchain)"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.job.os }}
          save-if: true

      - name: 配置 Cargo 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
            cargo-registry-
          save-always: true

      - name: 配置 Git 配置缓存
        run: |
          git config --global core.preloadindex true
          git config --global core.fscache true
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60

      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          sed -i '' 's/3.1.0/2.17.0/g' flutter/pubspec.yaml;
          cargo install flutter_rust_bridge_codegen --version ${{ matrix.job.bridge }} --features "uuid" --locked
          # below works for mac to make buildable on 3.13.9
          # pushd flutter/lib; find . -name "*.dart" | xargs -I{} sed -i '' 's/textScaler: TextScaler.linear(\(.*\)),/textScaleFactor: \1,/g' {}; popd;
          pushd flutter && flutter pub get && popd
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: 配置 vcpkg 依赖缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/vcpkg
            ${{ env.HOME }}/.cache/vcpkg
            /opt/artifacts/vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_COMMIT_ID }}-
            vcpkg-${{ runner.os }}-
          save-always: true

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"

      - name: Show version information (Rust, cargo, Clang)
        shell: bash
        run: |
          clang --version || true
          rustup -V
          rustup toolchain list
          # 确保使用正确的 Rust 工具链版本（修复 Cargo.lock 版本 4 兼容性问题）
          rustup default ${{ env.RUST_VERSION }}
          cargo -V
          rustc -V

      - name: 优化构建性能
        run: |
          chmod +x ./scripts/build-optimizer.sh
          ./scripts/build-optimizer.sh

      - name: 运行自动化测试
        run: |
          chmod +x ./scripts/test-runner.sh
          ./scripts/test-runner.sh

      - name: 构建 rustdesk
        run: |
          set -x
          set -e
          trap 'echo "构建失败，正在收集诊断信息..."; df -h; du -sh target 2>/dev/null || true' ERR
          echo "开始构建 RustDesk..."
          echo "构建环境信息："
          rustup -V
          rustup toolchain list
          rustup show
          cargo -V
          echo "开始执行构建脚本..."
          chmod +x ./scripts/build-monitor.sh
          ./scripts/build-monitor.sh ./build.py --flutter ${{ matrix.job.extra-build-args }}
          echo "构建成功完成！"
          echo "构建产物："
          ls -lh ./flutter/build/macos/Build/Products/Release/ 2>/dev/null || ls -lh ./target/release/ 2>/dev/null || true

      - name: 生成构建分析报告
        if: success()
        run: |
          chmod +x ./scripts/build-analyzer.py
          python3 ./scripts/build-analyzer.py

      - name: create unsigned dmg
        run: |
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          create-dmg --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" --window-size 800 400 --app-drop-link 600 185 rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg ./flutter/build/macos/Build/Products/Release/RustDesk.app

      - name: Codesign app and create signed dmg
        if: env.MACOS_P12_BASE64 != null
        run: |
          # Patch create-dmg to give more attempts to unmount image
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          # Unlock keychain
          security default-keychain -s rustdesk.keychain
          security unlock-keychain -p ${{ secrets.MACOS_P12_PASSWORD }} rustdesk.keychain
          # start sign the rustdesk.app and dmg
          rm -rf *.dmg || true
          codesign --force --options runtime -s ${{ secrets.MACOS_CODESIGN_IDENTITY }} --deep --strict ./flutter/build/macos/Build/Products/Release/RustDesk.app -vvv
          create-dmg --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" --window-size 800 400 --app-drop-link 600 185 rustdesk-${{ env.VERSION }}.dmg ./flutter/build/macos/Build/Products/Release/RustDesk.app
          codesign --force --options runtime -s ${{ secrets.MACOS_CODESIGN_IDENTITY }} --deep --strict rustdesk-${{ env.VERSION }}.dmg -vvv
          # notarize the rustdesk-${{ env.VERSION }}.dmg
          rcodesign notary-submit --api-key-path ${{ github.workspace }}/rustdesk.json  --staple rustdesk-${{ env.VERSION }}.dmg

      - name: Rename rustdesk
        run: |
          for name in rustdesk*??.dmg; do
              mv "$name" "${name%%.dmg}-${{ matrix.job.arch }}-flutter${{ matrix.job.flutter }}-flutter${{ matrix.job.date }}.dmg"
          done

      - name: Publish DMG package
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            rustdesk*-${{ matrix.job.arch }}*.dmg

      - name: 构建失败通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-failed',
              client_payload: {
                workflow: context.workflow,
                run_id: context.runId,
                run_url: context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
                job: '${{ matrix.job.target }}',
                message: '构建失败，请查看日志'
              }
            });

  build-rustdesk-android:
    if: false
    name: build rustdesk android apk ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              arch: aarch64,
              target: aarch64-linux-android,
              os: ubuntu-22.04,
              openssl-arch: android-arm64,
              ref: master, # latest
            }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          ref: ${{ matrix.job.ref }}
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -y && sudo apt-get install -y \
               clang \
               cmake \
               curl \
               gcc-multilib \
               git \
               g++ \
               g++-multilib \
               libayatana-appindicator3-dev \
               libasound2-dev \
               libc6-dev \
               libclang-dev \
               libunwind-dev \
               libgstreamer1.0-dev \
               libgstreamer-plugins-base1.0-dev \
               libgtk-3-dev \
               libpam0g-dev \
               libpulse-dev \
               libva-dev \
               libvdpau-dev \
               libxcb-randr0-dev \
               libxcb-shape0-dev \
               libxcb-xfixes0-dev \
               libxdo-dev \
               libxfixes-dev \
               llvm-dev \
               nasm \
               yasm \
               ninja-build \
               openjdk-17-jdk-headless \
               pkg-config \
               tree \
               wget

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v5
        with:
          path: flutter/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"
          default: true

      - name: Verify Rust toolchain installation
        shell: bash
        run: |
          rustup -V
          rustup toolchain list
          # 确保使用正确的 Rust 工具链版本（修复 Cargo.lock 版本 4 兼容性问题）
          rustup default ${{ env.RUST_VERSION }}
          cargo -V
          rustc -V
          echo "Using Rust toolchain: $(rustup show active-toolchain)"

      - name: Install flutter rust bridge deps
        run: |
          git config --global core.longpaths true
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          sed -i 's/uni_links_desktop/#uni_links_desktop/g' flutter/pubspec.yaml
          pushd flutter/lib;  find . | grep dart | xargs sed -i 's/textScaler: TextScaler.linear(\(.*\)),/textScaleFactor: \1,/g'; popd;
          pushd flutter ; flutter pub get ; popd
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          case ${{ matrix.job.target }} in
            aarch64-linux-android)
              ./flutter/build_android_deps.sh arm64-v8a
            ;;
            armv7-linux-androideabi)
              ./flutter/build_android_deps.sh armeabi-v7a
            ;;
          esac
        shell: bash

      - name: Clone deps
        shell: bash
        run: |
          pushd /opt
          git clone https://github.com/rustdesk-org/rustdesk_thirdparty_lib.git --depth=1
          ls -ls /opt/artifacts/vcpkg/installed/arm64-android/lib/
          # cp -rf /opt/rustdesk_thirdparty_lib/vcpkg/* /opt/artifacts/vcpkg/
          ls -ls /opt/artifacts/vcpkg/installed/arm64-android/lib/

      - name: Build rustdesk lib
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.job.target }}
          cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked --force
          case ${{ matrix.job.target }} in
            aarch64-linux-android)
              ./flutter/ndk_arm64.sh
              mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
              cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
            ;;
            armv7-linux-androideabi)
              ./flutter/ndk_arm.sh
              mkdir -p ./flutter/android/app/src/main/jniLibs/armeabi-v7a
              cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so
            ;;
          esac

      - name: Build rustdesk
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -x
          set -e
          trap 'echo "Android构建失败，正在收集诊断信息..."; df -h; du -sh target 2>/dev/null || true' ERR
          export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
          echo "开始构建 RustDesk Android..."
          echo "构建环境信息："
          java -version
          rustup -V
          cargo -V
          flutter --version
          echo "开始执行构建..."
          # temporary use debug sign config
          sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle
          case ${{ matrix.job.target }} in
            aarch64-linux-android)
              mkdir -p ./flutter/android/app/src/main/jniLibs/arm64-v8a
              cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/
              cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/arm64-v8a/librustdesk.so
              # build flutter
              pushd flutter
              flutter build apk --release --target-platform android-arm64 --split-per-abi
              mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ../rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk
            ;;
            armv7-linux-androideabi)
              mkdir -p ./flutter/android/app/src/main/jniLibs/armeabi-v7a
              cp ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/arm-linux-androideabi/libc++_shared.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/
              cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/armeabi-v7a/librustdesk.so
              # build flutter
              pushd flutter
              flutter build apk --release --target-platform android-arm --split-per-abi
              mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ../rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk
            ;;
          esac
          popd
          mkdir -p signed-apk; pushd signed-apk
          mv ../rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk ./rustdesk-test-${{ matrix.job.ref }}.apk
          echo "Android构建成功完成！"
          echo "构建产物："
          ls -lh ./

      - uses: r0adkll/sign-android-release@v1
        name: Sign app APK
        if: env.ANDROID_SIGNING_KEY != null
        id: sign-rustdesk
        with:
          releaseDirectory: ./signed-apk
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          # override default build-tools version (29.0.3) -- optional
          BUILD_TOOLS_VERSION: "30.0.2"

      - name: Publish signed apk package
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{steps.sign-rustdesk.outputs.signedReleaseFile}}

